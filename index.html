<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Oẳn Tù Tì - THCS Trương Công Giai</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-grid"></div>
    
    <div class="main-layout">
        <div class="left-panel">
            <header class="header">
                <p class="subtitle">NGÀY HỘI STEM - AI</p>
                <h1 class="title">THCS TRƯƠNG CÔNG GIAI</h1>
                <div class="badge">TRẠM TRẢI NGHIỆM: AI NHẬN DIỆN HÀNH ĐỘNG</div>
                <div class="round-info" id="roundInfo">Vui lòng nhập tên để bắt đầu!</div>
            </header>

            <div class="scoreboard">
                <div class="score-box player">
                    <span class="label" id="playerNameDisplay">NGƯỜI CHƠI</span>
                    <span class="score" id="scorePlayer">0</span>
                </div>
                <div class="vs">VS</div>
                <div class="score-box bot">
                    <span class="label">MÁY (AI)</span>
                    <span class="score" id="scoreBot">0</span>
                </div>
            </div>

            <div class="game-area" id="gameArea">
                <div class="video-container" id="videoContainer">
                    <video id="webcam" autoplay playsinline style="display: none;"></video>
                    <canvas id="output_canvas" width="640" height="480"></canvas>
                    <div id="countdownText" class="countdown-text hidden">3</div>
                </div>
            </div>

            <div class="status-panel">
                <div id="choiceDisplay" class="choice-display">Đang khởi động AI Camera...</div>
                <div id="resultText" class="result-text">Sẵn sàng!</div>
            </div>
        </div>

        <div class="right-panel">
            <h2 class="leaderboard-title">🏆 BẢNG XẾP HẠNG</h2>
            <ul id="highScoreList" class="high-score-list">
                </ul>
        </div>
    </div>

    <div id="nameModal" class="modal-overlay">
        <div class="modal-box">
            <h2>ĐĂNG KÝ NGƯỜI CHƠI</h2>
            <p>Mỗi người có tối đa 10 lượt chơi!</p>
            <input type="text" id="playerNameInput" placeholder="Nhập tên của bạn vào đây..." autocomplete="off">
            <button class="neon-btn" onclick="batDauGame()">BẮT ĐẦU CHƠI 🚀</button>
        </div>
    </div>

    <div id="gameOverModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>HẾT LƯỢT!</h2>
            <p id="finalScoreText" class="final-score-text"></p>
            <button class="neon-btn" onclick="resetChoNguoiMoi()">NGƯỜI CHƠI MỚI 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
